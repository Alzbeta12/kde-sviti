<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kde sviti</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --paper:#FFFFFF;--ink:#0D0D0D;--sun:#F7C325;--amber:#D4A017;
  --rust:#C13B1B;--rain:#4A90D9;--mid:#888;
  --rule:1px solid rgba(13,13,13,0.15);
  --font:'Satoshi',sans-serif;
  --display:'Satoshi',sans-serif;
}
html,body{height:100%;overflow:hidden;background:#FFFFFF;}
#map{position:fixed;inset:0;z-index:0;}
.leaflet-tile-pane{filter:saturate(0.82) brightness(0.97);}

/* HEADER */
#hdr{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--paper);border-bottom:1px solid rgba(13,13,13,0.1);font-family:var(--font);}
#hdr-top{display:flex;align-items:stretch;border-bottom:1px solid rgba(13,13,13,0.15);overflow-x:auto;scrollbar-width:none;}
#hdr-top::-webkit-scrollbar{display:none;}
.hc{padding:6px 11px;border-right:1px solid rgba(13,13,13,0.15);display:flex;flex-direction:column;justify-content:center;font-size:0.57rem;line-height:1.7;flex-shrink:0;}
.hc .lb{color:var(--mid);text-transform:uppercase;letter-spacing:1px;}
.hc .vl{font-weight:700;display:block;line-height:1.2;}
#logo{padding:7px 13px;border-right:1px solid rgba(13,13,13,0.1);display:flex;align-items:center;gap:9px;flex-shrink:0;}
#logo span{font-family:var(--display);font-size:1.65rem;letter-spacing:2px;line-height:1;}
#sdot{width:21px;height:21px;border-radius:50%;border:var(--rule);background:var(--sun);flex-shrink:0;transition:background 0.5s;}
#sdot.pulse{animation:pulse 2.2s ease-in-out infinite;}
#hdr-bot{display:flex;align-items:center;}
#btn-rt{font-family:var(--font);font-weight:700;font-size:0.6rem;letter-spacing:1px;padding:7px 11px;background:var(--paper);color:var(--ink);border:none;border-right:var(--rule);cursor:pointer;white-space:nowrap;flex-shrink:0;}
#btn-rt.off{background:transparent;color:var(--ink);}
#dt{font-family:var(--font);font-size:0.6rem;padding:7px 9px;background:transparent;border:none;border-right:1px solid rgba(13,13,13,0.15);outline:none;color:var(--ink);flex-shrink:0;min-width:0;color-scheme:light;}
#btn-lst{font-family:var(--font);font-weight:700;font-size:0.6rem;letter-spacing:1px;padding:7px 12px;background:transparent;color:var(--ink);border:none;border-left:1px solid rgba(13,13,13,0.15);cursor:pointer;white-space:nowrap;flex-shrink:0;}
#btn-map{font-family:var(--font);font-weight:700;font-size:0.6rem;letter-spacing:1px;padding:7px 12px;background:transparent;color:var(--ink);border:none;border-left:1px solid rgba(13,13,13,0.15);cursor:pointer;white-space:nowrap;flex-shrink:0;}
#btn-map:hover,#btn-lst:hover{background:var(--sun);}
#btn-lst:hover{background:var(--sun);}
.cnt-s{}
.cnt-p{}
.cnt-c{}
.cnt-r{color:var(--rain);font-size:1.1rem!important;}

/* LIST */
#list{position:fixed;inset:0;z-index:900;background:var(--paper);transform:translateX(-100%);transition:transform 0.28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;font-family:var(--font);}
#list.open{transform:translateX(0);}
#list-hdr{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid rgba(13,13,13,0.1);gap:12px;flex-shrink:0;}
#list-hdr h2{font-family:var(--display);font-size:1.2rem;letter-spacing:2px;flex:1;min-width:0;}
.lhb{font-family:var(--font);font-size:0.6rem;font-weight:700;padding:6px 12px;background:var(--ink);color:var(--sun);border:var(--rule);cursor:pointer;white-space:nowrap;}
.lhb:hover{background:var(--sun);}
#list-fil{display:flex;border-bottom:1px solid rgba(13,13,13,0.1);overflow-x:auto;scrollbar-width:none;flex-shrink:0;-webkit-overflow-scrolling:touch;}
#list-fil::-webkit-scrollbar{display:none;}
.fb{font-family:var(--font);font-size:0.65rem;padding:10px 12px;background:transparent;color:var(--ink);border:none;border-right:1px solid rgba(13,13,13,0.12);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.fb.on{background:var(--ink);color:var(--sun);font-weight:700;}
#list-sc{flex:1;overflow-y:auto;}
#list-sc::-webkit-scrollbar{width:3px;}
#list-sc::-webkit-scrollbar-thumb{background:var(--ink);}
.cat-lbl{padding:8px 12px 6px;font-size:0.65rem;letter-spacing:2px;color:var(--ink);font-weight:700;border-top:var(--rule);border-bottom:1px solid rgba(13,13,13,0.15);position:sticky;top:0;background:var(--paper);z-index:2;}
.lrow{display:flex;align-items:flex-start;gap:9px;padding:14px 16px;border-bottom:1px solid rgba(13,13,13,0.07);cursor:pointer;transition:background 0.08s;}
.lrow:hover,.lrow:active{background:var(--sun);}
.lbar{width:3px;height:30px;border:1px solid rgba(13,13,13,0.12);flex-shrink:0;margin-top:4px;}
/* .lnum{font-size:0.49rem;color:#bbb;width:16px;text-align:center;margin-top:2px;}
.lbody{flex:1;min-width:0;}
.laddr{font-size:0.6rem;color:#666;margin-bottom:2px;}
.lname{font-weight:900;font-size:1.1rem;line-height:1.2;margin-bottom:5px;color:#0D0D0D;}
.ladr{font-size:0.58rem;color:#999;margin-bottom:2px;font-weight:400;}
.lout{font-size:0.58rem;color:#888;margin-bottom:6px;font-weight:400;}
.lst{font-size:0.62rem;font-weight:700;letter-spacing:0.5px;margin-top:4px;display:inline-block;}
.lex{font-size:0.53rem;color:#aaa;margin-left:6px;}

/* SHEET */
#sheet{position:fixed;left:0;right:0;bottom:0;z-index:800;background:var(--paper);border-top:none;border-radius:20px 20px 0 0;transform:translateY(100%);transition:transform 0.3s cubic-bezier(.4,0,.2,1);font-family:var(--font);max-height:80vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,0.12);}
#sheet::-webkit-scrollbar{width:3px;}
#sheet::-webkit-scrollbar-thumb{background:var(--ink);}
#sheet.open{transform:translateY(0);}
#sh-handle{width:36px;height:4px;background:rgba(13,13,13,0.17);border-radius:2px;margin:10px auto 0;}
#sh-in{padding:12px 16px 28px;}
#sh-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(13,13,13,0.09);}
.snb{font-family:var(--font);font-size:0.59rem;font-weight:700;letter-spacing:1px;padding:5px 10px;background:transparent;border:1px solid rgba(13,13,13,0.2);cursor:pointer;}
.snb:hover{background:var(--sun);}
#sh-status-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
#sh-badge{display:inline-block;padding:4px 12px;border:1px solid rgba(13,13,13,0.15);font-size:0.61rem;font-weight:700;letter-spacing:1px;background:transparent;color:var(--ink);}
#sh-name{font-family:var(--font);font-size:1.8rem;font-weight:900;letter-spacing:-0.5px;line-height:1.05;margin-bottom:6px;}
#sh-addr{font-size:0.62rem;color:#666;margin-bottom:2px;}
#sh-hours{font-size:0.62rem;color:#666;margin-bottom:12px;}
#sh-st{display:inline-block;padding:4px 12px;border:1px solid rgba(13,13,13,0.15);font-size:0.61rem;font-weight:700;letter-spacing:1px;}
#sh-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(13,13,13,0.08);border:1px solid rgba(13,13,13,0.08);margin-bottom:12px;border-radius:8px;overflow:hidden;}
.ss{background:var(--paper);padding:8px 10px;font-size:0.57rem;line-height:1.6;}
.ss .sl{color:#999;display:block;font-size:0.48rem;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;}
.ss .sv{font-weight:600;color:var(--ink);font-size:0.75rem;}
.sh-label{font-size:0.48rem;letter-spacing:1.5px;color:#999;display:block;margin-bottom:4px;text-transform:uppercase;font-weight:500;}
#sh-beer{font-size:0.62rem;color:#333;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(13,13,13,0.08);}
#sh-beer b{color:var(--ink);}
#sh-note{font-size:0.62rem;color:#444;line-height:1.65;}

/* PINS */
.pin{width:32px;height:32px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid var(--ink);box-shadow:0 3px 8px rgba(0,0,0,0.28);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.pini{transform:rotate(45deg);font-size:0.82rem;}
.pin-sunny{background:var(--sun);}
.pin-partial{background:var(--amber);}
.pin-cloudy{background:#ccc;}
.pin-shady{background:#888;}
.pin-rain{background:var(--rain);}
.pin-set{background:#444;}


/* NAVIGATE BUTTON */
#sh-nav-btn {
  display:block; width:100%; padding:10px; margin-bottom:12px;
  background:var(--ink); color:var(--sun);
  font-family:var(--font); font-size:0.65rem; font-weight:700; letter-spacing:1px;
  border:none; cursor:pointer; text-align:center; text-decoration:none;
}
#sh-nav-btn:hover { background:#222; }

/* SUN WINDOW */
#sh-sun-window {
  font-size:0.62rem; color:var(--ink); font-weight:700;
  margin-bottom:10px; padding:8px 10px;
  background:#F7C325; border:var(--rule);
}
#sh-sun-window.no-sun {
  background:transparent; color:var(--mid);
}

/* TIMELINE */
#sh-timeline { margin-bottom:12px; }
.tl-day { font-size:0.5rem; color:var(--mid); letter-spacing:1px; margin-bottom:4px; text-transform:uppercase; }
.tl-hours { display:flex; gap:2px; flex-wrap:wrap; }
.tl-slot {
  width:28px; height:28px; display:flex; align-items:center; justify-content:center;
  font-size:0.55rem; border:1px solid rgba(13,13,13,0.1); flex-direction:column;
  flex-shrink:0;
}
.tl-slot .tl-h { font-size:0.45rem; color:var(--mid); }
.tl-slot.sunny   { background:#F7C325; border-color:#D4A017; }
.tl-slot.partial { background:#D4A017; border-color:#B8860B; }
.tl-slot.cloudy  { background:#d8d8d8; border-color:#bbb; }
.tl-slot.shady   { background:#888; border-color:#666; }
.tl-slot.set     { background:#888; border-color:#666; }
.tl-slot.night   { background:#e8e4de; border-color:rgba(13,13,13,0.05); opacity:0.5; }

/* TIMELINE LEGENDA */
#sh-tl-legend {
  display:flex; gap:10px; flex-wrap:wrap;
  font-family:var(--font); font-size:0.5rem; letter-spacing:0.5px;
  margin-top:4px; margin-bottom:12px; color:var(--mid);
}
.tll { display:flex; align-items:center; gap:3px; }
.tll.sunny   { color:#C8A000; }
.tll.partial { color:#A07800; }
.tll.cloudy  { color:#999; }
.tll.shady   { color:#555; }

/* USER LOCATION PIN */
.user-pin {
  width: 16px; height: 16px;
  background: #2E86FF;
  border: 3px solid #fff;
  border-radius: 50%;
  box-shadow: 0 0 0 2px #2E86FF, 0 2px 8px rgba(0,0,0,0.3);
}

/* BOTTOM LEFT CONTROLS */
#ctl{position:fixed;bottom:20px;left:14px;z-index:700;display:flex;flex-direction:column;gap:6px;}
.cbtn{font-family:var(--font);font-size:0.59rem;font-weight:700;letter-spacing:1px;padding:7px 11px;background:var(--ink);color:var(--paper);border:var(--rule);cursor:pointer;white-space:nowrap;}
.cbtn:hover{background:var(--sun);}
.cbtn.on{background:var(--ink);color:var(--sun);}

/* TIME SLIDER */
#slwrap{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:700;background:var(--paper);border:var(--rule);padding:10px 14px 8px;font-family:var(--font);width:min(360px,calc(100vw - 140px));display:none;box-shadow:0 4px 16px rgba(0,0,0,0.14);}
#slwrap.on{display:block;}
#sl-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
#sl-lbl{font-family:var(--display);font-size:1.3rem;letter-spacing:2px;}
#btn-play{font-family:var(--font);font-size:0.57rem;font-weight:700;letter-spacing:1px;padding:4px 10px;background:transparent;border:var(--rule);cursor:pointer;}
#btn-play:hover{background:var(--sun);}
#btn-play.on{background:var(--ink);color:var(--sun);}
#slr{width:100%;-webkit-appearance:none;height:3px;background:var(--ink);outline:none;cursor:pointer;margin-bottom:4px;}
#slr::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:var(--sun);border:2px solid var(--ink);border-radius:50%;cursor:grab;}
#slr::-moz-range-thumb{width:16px;height:16px;background:var(--sun);border:2px solid var(--ink);border-radius:50%;}
#sl-ticks{display:flex;justify-content:space-between;font-size:0.48rem;color:var(--mid);}

/* LEGEND */
#leg{position:fixed;bottom:20px;right:14px;z-index:700;background:var(--paper);border:var(--rule);padding:8px 10px;font-family:var(--font);font-size:0.53rem;line-height:2;}
.lr{display:flex;align-items:center;gap:6px;}
.ld{width:9px;height:9px;border-radius:50%;border:1px solid rgba(0,0,0,0.13);flex-shrink:0;}

/* LEAFLET */
.leaflet-control-zoom{border:var(--rule)!important;border-radius:0!important;}
.leaflet-control-zoom a{font-family:var(--font)!important;font-weight:700!important;background:var(--paper)!important;color:var(--ink)!important;border-radius:0!important;border-bottom:1px solid rgba(13,13,13,0.18)!important;line-height:28px!important;width:28px!important;height:28px!important;font-size:1rem!important;}
.leaflet-control-zoom a:hover{background:var(--sun)!important;}
.leaflet-control-attribution{font-family:var(--font)!important;font-size:0.49rem!important;background:rgba(242,237,228,0.85)!important;}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
</style>
</head>
<body>

<div id="map"></div>

<div id="hdr">
  <div id="hdr-top">
    <div id="logo"><span>KDE</span><div id="sdot"></div><span>SVÍTÍ</span></div>
    <div class="hc"><span class="lb">Počasí</span><span class="vl" id="hw">...</span></div>
    <div class="hc"><span class="lb">Výška</span><span class="vl" id="hs">-</span></div>
    <div class="hc" id="hc-s" style="display:none"><span class="lb">Svítí</span><span class="vl cnt-s" id="cnt-s">0</span></div>
    <div class="hc" id="hc-c" style="display:none"><span class="lb">Zataženo</span><span class="vl cnt-c" id="cnt-c">0</span></div>
  </div>
  <div id="hdr-bot">
    <button id="btn-rt" onclick="goRT()">&#9201; TEĎ ŽIVĚ</button>
    <input type="datetime-local" id="dt" onchange="goCust(this.value)">
    <button id="btn-lst" onclick="openList()">&#9776; SEZNAM</button>
    <button id="btn-map" onclick="goMap()">&#9679; MAPA</button>
  </div>
</div>

<div id="list">
  <div id="list-hdr">
    <h2>KDE SVÍTÍ</h2>
    <button class="lhb" onclick="goMap()">&#8592; MAPA</button>
  </div>
  <div id="list-fil">
    <button class="fb on" onclick="setFlt('vse',this)">VŠE</button>
    <button class="fb" onclick="setFlt('zahradka',this)">ZAHRÁDKA</button>
    <button class="fb" onclick="setFlt('lokal',this)">LOKÁLY</button>
    <button class="fb" onclick="setFlt('pivovar',this)">PIVOVARY</button>
    <button class="fb" onclick="setFlt('mokrej',this)">MOKREJ LOKET</button>
  </div>
  <div id="list-sc"></div>
</div>

<div id="sheet">
  <div id="sh-handle"></div>
  <div id="sh-in">
    <div id="sh-nav">
      <button class="snb" onclick="backToList()">&#8592; SEZNAM</button>
      <button class="snb" onclick="closeSheet()">&#10005; ZAVŘÍT</button>
    </div>
    <div id="sh-name"></div>
    <a id="sh-nav-btn" href="#" target="_blank">&#9655; KUDY NA PIVO</a>
    <div id="sh-sun-window"></div>
    <div id="sh-timeline"></div>
    <div id="sh-tl-legend">
      <span class="tll sunny">&#9679; SVÍTÍ</span>
      <span class="tll partial">&#9679; ČÁSTEČNĚ</span>
      <span class="tll cloudy">&#9675; ZATAŽENO</span>
      <span class="tll shady">&#9679; STÍN</span>
    </div>
    <div id="sh-addr"></div>
    <div id="sh-hours"></div>
    <div id="sh-status-row">
      <div id="sh-st"></div>
      <div id="sh-badge"></div>
    </div>
    <div id="sh-grid">
      <div class="ss"><span class="sl">VÝŠKA SLUNCE</span><span class="sv" id="s-alt">-</span></div>
      <div class="ss"><span class="sl">ZÁPAD SLUNCE</span><span class="sv" id="s-set">-</span></div>
      <div class="ss"><span class="sl">OBLAČNOST</span><span class="sv" id="s-cld">-</span></div>
      <div class="ss"><span class="sl">SRÁŽKY</span><span class="sv" id="s-rain">-</span></div>
    </div>
    <div id="sh-beer"></div>
    <div id="sh-note"></div>
  </div>
</div>

<div id="ctl">
  <button class="cbtn" id="btn-shade" onclick="toggleShade()">&#9681; STÍNY</button>
  <button class="cbtn" id="btn-geo" onclick="reqGeo()">&#9678; POLOHA</button>
</div>

<div id="slwrap">
  <div id="sl-top">
    <span id="sl-lbl">12:00</span>
    <button id="btn-play" onclick="togglePlay()">&#9654; PLAY</button>
  </div>
  <input type="range" id="slr" min="0" max="1439" step="5" value="720" oninput="onSlider(this.value)">
  <div id="sl-ticks"><span>0:00</span><span>6:00</span><span>12:00</span><span>18:00</span><span>23:55</span></div>
</div>

<div id="leg">
  <div class="lr"><div class="ld" style="background:#F7C325"></div>SVÍTÍ</div>
  <div class="lr"><div class="ld" style="background:#D4A017"></div>ČÁSTEČNĚ</div>
  <div class="lr"><div class="ld" style="background:#ccc"></div>ZATAŽENO</div>
  <div class="lr"><div class="ld" style="background:#888"></div>STÍN</div>
</div>

<!-- Leaflet MUST load before app script -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

// ── DATA (GPS verified via Google Places) ────────────────────────────────────

// ── HELPERS ──────────────────────────────────────────────────────────────────
function p2(n){return String(n).padStart(2,'0');}
function toISO(d){return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate())+'T'+p2(d.getHours())+':'+p2(d.getMinutes());}
function hk(d){return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate())+'T'+p2(d.getHours())+':00';}
function ftm(d){return d.toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'});}
function clt(c){if(c==null)return'-';if(c<20)return 'Jasno';if(c<40)return 'Skoro jasno';if(c<60)return 'Polojasno';if(c<80)return 'Oblačno';return 'Zataženo';}

// ── GEOLOCATION ──────────────────────────────────────────────────────────────
function getDistance(lat1, lng1, lat2, lng2) {
  var R = 6371;
  var dLat = (lat2-lat1) * Math.PI/180;
  var dLng = (lng2-lng1) * Math.PI/180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
          Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
          Math.sin(dLng/2)*Math.sin(dLng/2);
  var c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  return R*c;
}

function fmtDist(km) {
  if (km < 1) return Math.round(km*1000) + ' m';
  return km.toFixed(1) + ' km';
}

function startGeo() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(function(pos) {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;
    updAll();
  }, function(err) {
    console.warn('Geolocation error:', err.message);
  }, {enableHighAccuracy:true, timeout:10000, maximumAge:60000});
}

function reqGeo() {
  var btn = document.getElementById('btn-geo');
  if (!navigator.geolocation) { btn.textContent = 'GPS N/A'; return; }
  btn.textContent = 'HLEDÁM...';
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      btn.textContent = 'POLOHA OK';
      btn.classList.add('on');
      // Pridat/aktualizovat pin polohy
      if (userMarker) map.removeLayer(userMarker);
      userMarker = L.marker([pos.coords.latitude, pos.coords.longitude], {
        icon: L.divIcon({className:'', html:'<div class="user-pin"></div>', iconSize:[16,16], iconAnchor:[8,8]})
      }).addTo(map);
      map.panTo([pos.coords.latitude, pos.coords.longitude], {animate:true});
      updAll();
    },
    function(err) {
      btn.textContent = 'POLOHA';
      btn.classList.remove('on');
    },
    {enableHighAccuracy:false, timeout:15000, maximumAge:300000}
  );
}

// ── SHADE ────────────────────────────────────────────────────────────────────
function tryInitShade(cb) {
  if (shade) { cb(true); return; }
  if (!SM_LOADED || typeof L.shadeMap === 'undefined') {
    // Wait up to 5s for ShadeMap to load
    var tries = 0;
    var wait = setInterval(function() {
      tries++;
      if (SM_LOADED && typeof L.shadeMap !== 'undefined') {
        clearInterval(wait);
        buildShade(cb);
      } else if (tries > 50) {
        clearInterval(wait);
        cb(false);
      }
    }, 100);
  } else {
    buildShade(cb);
  }
}

function buildShade(cb) {
  try {
    shade = L.shadeMap({
      date: cDate,
      color: '#01112f',
      opacity: 0.65,
      apiKey: SM_KEY,
      terrainSource: {
        tileSize: 256, maxZoom: 15,
        getSourceUrl: function(t) { return 'https://s3.amazonaws.com/elevation-tiles-prod/terrarium/'+t.z+'/'+t.x+'/'+t.y+'.png'; },
        getElevation:  function(t) { return (t.r*256 + t.g + t.b/256) - 32768; }
      },
      getFeatures: async function() {
        if (map.getZoom() < 14) return [];
        var b = map.getBounds();
        var q = 'https://overpass-api.de/api/interpreter?data=[out:json][timeout:25];(way["building"]('+b.getSouth()+','+b.getWest()+','+b.getNorth()+','+b.getEast()+'););out body;>;out skel qt;';
        try {
          var r = await fetch(q); var j = await r.json(); var ns = {};
          j.elements.filter(function(e){return e.type==='node';}).forEach(function(n){ns[n.id]=[n.lon,n.lat];});
          return j.elements.filter(function(e){return e.type==='way';}).map(function(w){
            return {type:'Feature', geometry:{type:'Polygon', coordinates:[w.nodes.map(function(i){return ns[i];}).filter(Boolean)]},
              properties:{height: w.tags&&w.tags.height ? parseFloat(w.tags.height) : w.tags&&w.tags['building:levels'] ? parseFloat(w.tags['building:levels'])*3 : 3}};
          }).filter(function(f){return f.geometry.coordinates[0].length >= 3;});
        } catch(e) { return []; }
      }
    });
    cb(true);
  } catch(e) {
    console.warn('ShadeMap build failed:', e);
    shade = null;
    cb(false);
  }
}

function toggleShade() {
  var btn = document.getElementById('btn-shade');
  var sw  = document.getElementById('slwrap');
  if (!shOn) {
    btn.textContent = 'NAČÍTÁM...';
    btn.disabled = true;
    tryInitShade(function(ok) {
      btn.disabled = false;
      if (ok && shade) {
        shade.addTo(map);
        shOn = true;
        btn.classList.add('on');
        btn.textContent = 'STÍNY ZAP';
        sw.classList.add('on');
        var now = new Date();
        var mins = now.getHours()*60 + now.getMinutes();
        document.getElementById('slr').value = mins;
        onSlider(mins);
      } else {
        btn.textContent = 'STÍNY (nedostupné)';
        setTimeout(function(){ btn.textContent='STÍNY'; }, 3000);
      }
    });
  } else {
    try { if (shade) { shade.remove(); shade = null; } } catch(e) {}
    if (playing) stopPlay();
    shOn = false;
    btn.classList.remove('on');
    btn.textContent = 'STÍNY';
    sw.classList.remove('on');
  }
}

// ── SLIDER ───────────────────────────────────────────────────────────────────
function onSlider(v) {
  var m = parseInt(v), h = Math.floor(m/60), mn = m%60;
  document.getElementById('sl-lbl').textContent = p2(h)+':'+p2(mn);
  var d = new Date(); d.setHours(h, mn, 0, 0);
  if (shade && shOn) { try { shade.setDate(d); } catch(e) {} }
  var sp = SC.getPosition(d, 50.08, 14.42);
  var up = sp.altitude > 0;
  document.getElementById('hs').textContent = up ? (sp.altitude*180/Math.PI).toFixed(0)+'°' : 'pod obzorem';
}

function stopPlay() {
  clearInterval(pIv); playing = false;
  var b = document.getElementById('btn-play');
  b.innerHTML = '&#9654; PLAY'; b.classList.remove('on');
}

function togglePlay() {
  if (playing) { stopPlay(); return; }
  playing = true;
  var b = document.getElementById('btn-play');
  b.innerHTML = '&#9646;&#9646; PAUSE'; b.classList.add('on');
  pIv = setInterval(function() {
    var s = document.getElementById('slr');
    var v = parseInt(s.value) + 10; if (v > 1439) v = 0;
    s.value = v; onSlider(v);
  }, 120);
}

  .then(function(r){ return r.json(); })
  .then(function(data) {
    var now=new Date(), k=hk(now), cur=data.current||{}, h=data.hourly||{}, hi=(h.time||[]).indexOf(k), hm={};
    (h.time||[]).forEach(function(t,i){ hm[t]={cloud:h.cloud_cover?h.cloud_cover[i]:null, pp:h.precipitation_probability?h.precipitation_probability[i]:null, prec:h.precipitation?h.precipitation[i]:null}; });
    wCache = {
      cloud: cur.cloud_cover!=null ? cur.cloud_cover : (h.cloud_cover&&hi>=0 ? h.cloud_cover[hi] : null),
      prec:  cur.precipitation!=null ? cur.precipitation : (h.precipitation&&hi>=0 ? h.precipitation[hi] : null),
      pp:    h.precipitation_probability&&hi>=0 ? h.precipitation_probability[hi] : null,
      hm: hm
    };
    document.getElementById('hw').textContent = clt(wCache.cloud);
    updAll();
  })
  .catch(function() {
    document.getElementById('hw').textContent = '? nedostupné';
    updAll();
  });
}

function getWx(d) {
  if (!wCache) return null;
  if (isRT) return wCache;
  var k = hk(d), h = wCache.hm ? wCache.hm[k] : null;
  return h || wCache;
}

// ── STATUS ───────────────────────────────────────────────────────────────────
function getSt(p, d) {
  var w = getWx(d);
  // dest ignorujeme - nikdo ven nepujde
  var pos = SC.getPosition(d, p.lat, p.lng);
  var alt = pos.altitude * 180/Math.PI;
  if (alt < 2) return 'set';
  var az = ((pos.azimuth*180/Math.PI)+180+360)%360;
  var df = Math.abs(az - p.f); if (df > 180) df = 360-df;
  if (p.a < 360 && df >= p.a/2) return 'shady';
  if (!w || w.cloud==null) return 'sunny';
  if (w.cloud >= 80) return 'cloudy';
  if (w.cloud >= 40) return 'partial';
  return 'sunny';
}

var SM = {
  sunny:   {l:'SVÍTÍ',    c:'#F7C325', d:'#F7C325'},
  partial: {l:'ČÁSTEČNĚ', c:'#D4A017', d:'#D4A017'},
  cloudy:  {l:'ZATAŽENO', c:'#555',    d:'#bbb'},
  shady:   {l:'STÍN',     c:'#444',    d:'#888'},
  set:     {l:'ZÁPAD',    c:'#bbb',    d:'#555'},
};

// ── PINS ─────────────────────────────────────────────────────────────────────
function mkIco(s) {
  return L.divIcon({className:'', html:'<div class="pin pin-'+s+'"><div class="pini">&#127866;</div></div>', iconSize:[32,32], iconAnchor:[16,32]});
}

function initMkrs() {
  PLACES.forEach(function(p) {
    var s = getSt(p, cDate);
    var m = L.marker([p.lat, p.lng], {icon: mkIco(s)})
      .addTo(map)
      .on('click', (function(id){ return function(e){ L.DomEvent.stopPropagation(e); openSheet(id); }; })(p.id));
    mkrs[p.id] = {m:m, s:s};
  });
}

function updMkrs() {
  var c = {sunny:0, partial:0, cloudy:0, shady:0, rain:0, set:0};
  PLACES.forEach(function(p) {
    var s = getSt(p, cDate);
    mkrs[p.id].m.setIcon(mkIco(s));
    mkrs[p.id].s = s;
    c[s]++;
  });
  var map_k = {s:'sunny', c:'cloudy'};
  Object.keys(map_k).forEach(function(k) {
    var key = map_k[k];
    document.getElementById('cnt-'+k).textContent = c[key];
    document.getElementById('hc-'+k).style.display = c[key] > 0 ? '' : 'none';
  });
  var sp  = SC.getPosition(cDate, 50.08, 14.42);
  var up  = sp.altitude > 0;
  var alt = (sp.altitude*180/Math.PI).toFixed(0);
  var dot = document.getElementById('sdot');
  var cld = wCache ? wCache.cloud : null;
  dot.style.background = !up ? '#999' : cld==null ? '#F7C325' : cld>=80 ? '#bbb' : cld>=40 ? '#D4A017' : '#F7C325';
  (up && (cld==null||cld<40)) ? dot.classList.add('pulse') : dot.classList.remove('pulse');
  document.getElementById('hs').textContent = up ? alt+'°' : 'pod obzorem';
  if (shade && shOn) { try { shade.setDate(cDate); } catch(e) {} }
  if (document.getElementById('list').classList.contains('open')) renderList();
}

// ── SUN WINDOW & TIMELINE ────────────────────────────────────────────────────
function getSunWindow(p, date) {
  // Najit nejblizsi okno kdy sviti (dnes) - pouzit hourly weather data
  var d = new Date(date); d.setMinutes(0,0,0);
  var sunnyStart = null, sunnyEnd = null;
  var now = date.getTime();

  for (var i = 0; i < 24; i++) {
    var t = new Date(d); t.setHours(i);
    var wx = getWxForHour(t);
    var st = getStWithWx(p, t, wx);
    if (st === 'sunny' || st === 'partial') {
      if (sunnyStart === null && t.getTime() >= now - 3600000) sunnyStart = new Date(t);
      sunnyEnd = new Date(t);
      sunnyEnd.setMinutes(59);
    } else {
      if (sunnyStart !== null && t.getTime() > now) break;
    }
  }
  return {start: sunnyStart, end: sunnyEnd};
}

function renderSunWindow(p, date) {
  var el = document.getElementById('sh-sun-window');
  var w = getSunWindow(p, date);
  var now = date;

  if (!w.start && !w.end) {
    // Zkusit najit zitra
    var tomorrow = new Date(date); tomorrow.setDate(tomorrow.getDate()+1); tomorrow.setHours(6,0,0,0);
    var wt = getSunWindow(p, tomorrow);
    if (wt.start) {
      el.className = 'no-sun';
      el.textContent = 'Svítí zítra od ' + p2(wt.start.getHours()) + ':00';
    } else {
      el.className = 'no-sun';
      el.textContent = 'Dnes není předpokládáno slunce';
    }
    return;
  }

  el.className = '';
  var curSt = getSt(p, now);
  if (curSt === 'sunny' || curSt === 'partial') {
    // Prave sviti - kdy skonci
    var mins = Math.round((w.end.getTime() - now.getTime()) / 60000);
    if (mins <= 0) { el.textContent = 'Právě svítí'; return; }
    var h = Math.floor(mins/60), m = mins%60;
    el.textContent = 'Svítí ještě ' + (h > 0 ? h + ' h ' : '') + m + ' min (do ' + p2(w.end.getHours()) + ':' + p2(w.end.getMinutes()) + ')';
  } else {
    // Zatim nesviti - kdy zacne
    if (w.start) {
      var mins2 = Math.round((w.start.getTime() - now.getTime()) / 60000);
      if (mins2 > 0) {
        var h2 = Math.floor(mins2/60), m2 = mins2%60;
        el.textContent = 'Začne svítit za ' + (h2 > 0 ? h2 + ' h ' : '') + m2 + ' min (v ' + p2(w.start.getHours()) + ':00)';
      } else {
        el.textContent = 'Svítí od ' + p2(w.start.getHours()) + ':00';
      }
    }
  }
}

function getWxForHour(d) {
  // Ziskat pocasi pro konkretni hodinu z hourly cache
  if (!wCache || !wCache.hm) return wCache;
  var k = hk(d);
  return wCache.hm[k] || wCache;
}

function getStWithWx(p, d, wx) {
  // getSt s explicitnim pocasim
  if (wx && ((wx.prec!=null&&wx.prec>0.1)||(wx.pp!=null&&wx.pp>=70))) return 'rain';
  var pos = SC.getPosition(d, p.lat, p.lng);
  var alt = pos.altitude * 180/Math.PI;
  if (alt < 2) return 'set';
  var az = ((pos.azimuth*180/Math.PI)+180+360)%360;
  var df = Math.abs(az - p.f); if (df > 180) df = 360-df;
  if (p.a < 360 && df >= p.a/2) return 'shady';
  if (!wx || wx.cloud==null) return 'sunny';
  if (wx.cloud >= 80) return 'cloudy';
  if (wx.cloud >= 40) return 'partial';
  return 'sunny';
}

function renderTimeline(p, date) {
  var el = document.getElementById('sh-timeline');
  var html = '';
  var days = [new Date(date), new Date(date)];
  days[1].setDate(days[1].getDate() + 1);
  var dayNames = ['Dnes', 'Zítra'];

  days.forEach(function(day, di) {
    var d = new Date(day); d.setHours(0,0,0,0);
    html += '<div class="tl-day">' + dayNames[di] + '</div><div class="tl-hours">';
    for (var h = 6; h < 22; h++) {
      var t = new Date(d); t.setHours(h);
      var pos = SC.getPosition(t, p.lat, p.lng);
      var alt = pos.altitude * 180/Math.PI;
      var cls = 'night';
      if (alt > 2) {
        var wx = getWxForHour(t);
        var st = getStWithWx(p, t, wx);
        cls = st === 'sunny' ? 'sunny' : st === 'partial' ? 'partial' : st === 'shady' ? 'shady' : st === 'rain' ? 'cloudy' : 'cloudy';
      }
      var isNow = (di === 0 && h === date.getHours());
      html += '<div class="tl-slot ' + cls + (isNow ? '" style="border:2px solid var(--ink)' : '') + '">'
           + '<span class="tl-h">' + p2(h) + '</span>'
           + '</div>';
    }
    html += '</div>';
    if (di === 0) html += '<div style="height:6px"></div>';
  });
  el.innerHTML = html;
}

// ── SHEET ────────────────────────────────────────────────────────────────────
function openSheet(id) {
  var p = PLACES.filter(function(x){return x.id===id;})[0];
  var s = (mkrs[id]&&mkrs[id].s) || getSt(p, cDate);
  var m = SM[s];
  var pos  = SC.getPosition(cDate, p.lat, p.lng);
  var ti   = SC.getTimes(cDate, p.lat, p.lng);
  var w    = getWx(cDate);
  document.getElementById('sh-badge').textContent = TL[p.type] || '';
  document.getElementById('sh-name').textContent  = p.name;
  document.getElementById('sh-addr').textContent  = p.addr;
  document.getElementById('sh-hours').textContent = p.hours;
  var sb = document.getElementById('sh-st');
  sb.textContent = m.l;
  sb.style.background = 'transparent';
  sb.style.color = s==='sunny'?'#F7C325': s==='partial'?'#D4A017': s==='cloudy'?'#888':'#444';
  document.getElementById('s-alt').textContent  = (pos.altitude*180/Math.PI).toFixed(1)+'°';
  document.getElementById('s-set').textContent  = ftm(ti.sunset);
  document.getElementById('s-cld').textContent  = clt(w?w.cloud:null);
  document.getElementById('s-rain').textContent = w&&w.pp!=null ? w.pp+'%' : (w&&w.prec>0 ? w.prec.toFixed(1)+' mm/h' : '-');
  var distStr = '';
  if (userLat !== null) {
    var dist = getDistance(userLat, userLng, p.lat, p.lng);
    distStr = ' &middot; <b>'+fmtDist(dist)+' od vás</b>';
  }
  document.getElementById('sh-beer').innerHTML = '<span class="sh-label">NA ČEPU</span>'+p.beer;
  var noteEl2 = document.getElementById('sh-note');
  noteEl2.innerHTML = p.note ? '<span class="sh-label">O PODNIKU</span>'+p.note : '';
  noteEl2.style.display = p.note ? '' : 'none';
  // Google Maps navigace
  var navBtn = document.getElementById('sh-nav-btn');
  if (userLat !== null) {
    navBtn.href = 'https://www.google.com/maps/dir/' + userLat + ',' + userLng + '/' + p.lat + ',' + p.lng;
  } else {
    navBtn.href = 'https://www.google.com/maps/dir//' + p.lat + ',' + p.lng;
  }

  // Sun window a timeline
  renderSunWindow(p, cDate);
  renderTimeline(p, cDate);

  map.panTo([p.lat, p.lng], {animate:true});
  document.getElementById('sheet').classList.add('open');
}
function closeSheet() { document.getElementById('sheet').classList.remove('open'); }
function backToList() { closeSheet(); setTimeout(openList, 50); }

// ── LIST ─────────────────────────────────────────────────────────────────────
function openList()  { renderList(); document.getElementById('list').classList.add('open'); }
function closeList() { document.getElementById('list').classList.remove('open'); }
function goMap()     { closeList(); closeSheet(); }

function setFlt(v, btn) {
  flt = v;
  document.querySelectorAll('.fb').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  renderList();
}

function renderList() {
  var el = document.getElementById('list-sc'), html = '';
  CATS.forEach(function(cat) {
    var items = PLACES
      .filter(function(p){ return (flt==='vse'||p.type===cat.k) && p.type===cat.k; })
      .map(function(p){ return Object.assign({}, p, {s:(mkrs[p.id]&&mkrs[p.id].s)||getSt(p,cDate)}); })
      .sort(function(a,b){
        var o={sunny:0,partial:1,cloudy:2,shady:3,set:4};
        var statDiff = (o[a.s]||0)-(o[b.s]||0);
        if (statDiff !== 0) return statDiff;
        if (userLat != null) return getDistance(userLat,userLng,a.lat,a.lng)-getDistance(userLat,userLng,b.lat,b.lng);
        return 0;
      });
    if (!items.length) return;
    html += '<div class="cat-lbl">'+cat.l+'</div>';
    items.forEach(function(p) {
      var m=SM[p.s], w=getWx(cDate), ex='';
      var d_km = userLat !== null ? getDistance(userLat,userLng,p.lat,p.lng) : null;

      var distLabel = d_km !== null ? '<span class="lex">'+fmtDist(d_km)+'</span>' : '';
      html += '<div class="lrow" onclick="selList('+p.id+')">'
        +'<div><div class="lbar" style="background:'+m.d+'"></div></div>'
        +'<div class="lbody"><div class="lname" style="font-size:1.1rem;font-weight:900;color:#0D0D0D;margin-bottom:4px;">'+p.name+'</div><div class="ladr" style="font-size:0.58rem;color:#999;margin-bottom:2px;">'+p.addr+'</div>'
        +'<div class="lout" style="font-size:0.58rem;color:#444;margin-bottom:6px;">'+p.out+' &middot; '+p.beer+'</div>'
        +'<span class="lst" style="color:'+m.c+';font-size:0.62rem;font-weight:700;">'+m.l+'</span>'+(ex?'<span class="lex">'+ex+'</span>':'')+distLabel
        +'</div></div>';
    });
  });
  el.innerHTML = html;
}

function selList(id) { closeList(); setTimeout(function(){ openSheet(id); }, 50); }

// ── TIME ─────────────────────────────────────────────────────────────────────
function goRT() {
  isRT = true; cDate = new Date();
  document.getElementById('dt').value = toISO(cDate);
  document.getElementById('btn-rt').classList.remove('off');
  updAll();
}
function goCust(v) {
  if (!v) return;
  isRT = false; cDate = new Date(v);
  document.getElementById('btn-rt').classList.add('off');
  updAll();
}
function updAll() { updMkrs(); }

// ── SWIPE TO CLOSE ───────────────────────────────────────────────────────────
(function(){
  var sh=document.getElementById('sheet'), sy=0;
  sh.addEventListener('touchstart', function(e){ sy=e.touches[0].clientY; }, {passive:true});
  sh.addEventListener('touchend',   function(e){ if(e.changedTouches[0].clientY-sy>60) closeSheet(); }, {passive:true});
})();

// ── POLOHA ──────────────────────────────────────────────────────────────────
var userMarker = null;
var userLat = null, userLng = null;

function locateMe() {
  if (!navigator.geolocation) {
    alert('Poloha není dostupná v tomto prohlížeči.');
    return;
  }
  var btn = document.getElementById('btn-loc');
  btn.textContent = '⌛ Hledám...';
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      // Zobrazit modrý bod
      if (userMarker) map.removeLayer(userMarker);
      userMarker = L.circleMarker([userLat, userLng], {
        radius: 10,
        fillColor: '#4A90D9',
        color: '#0D0D0D',
        weight: 2,
        fillOpacity: 0.9,
      }).addTo(map);
      map.setView([userLat, userLng], 15, {animate: true});
      btn.classList.add('active');
      btn.textContent = '&#9679; POLOHA';
      // Seřadit seznam podle vzdálenosti
      renderList();
    },
    function() {
      btn.textContent = '&#9679; POLOHA';
      alert('Nepodařilo se zjistit polohu.');
    }
  );
}

function distanceTo(lat, lng) {
  if (userLat == null) return 999999;
  var R = 6371000;
  var dLat = (lat - userLat) * Math.PI / 180;
  var dLng = (lng - userLng) * Math.PI / 180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
          Math.cos(userLat*Math.PI/180)*Math.cos(lat*Math.PI/180)*
          Math.sin(dLng/2)*Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}



// ── INIT ─────────────────────────────────────────────────────────────────────
document.getElementById('dt').value = toISO(cDate);
initMkrs();
loadWx();
setInterval(function(){ if(isRT){ cDate=new Date(); document.getElementById('dt').value=toISO(cDate); updAll(); } }, 30000);
setInterval(loadWx, 30*60*1000);
